<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Detail</title>
    <link rel="stylesheet" href="../../css/dashboard.css">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            padding: 20px;
        }
        .detail-container {
            max-width: 800px;
            margin: 40px auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
        .product-info p {
            font-size: 1.1rem;
            line-height: 1.6;
            color: #555;
            margin: 10px 0;
        }
        .product-info strong {
            color: #2c3e50;
            width: 120px;
            display: inline-block;
        }
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .back-btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <div class="detail-container">
        <h1>Product Detail</h1>
        <div id="productDetail" class="product-info">
            <!-- Product details will be displayed here -->
        </div>
        <a href="../dashboard.html" class="back-btn">Back to Dashboard</a>
    </div>
    <script>
        const API_PRODUCTS = "http://localhost:8000/api/products";

// Get product_id from URL
const urlParams = new URLSearchParams(window.location.search);
const productId = urlParams.get('id');

const container = document.getElementById('productDetail');

async function fetchProduct() {
    try {
        const res = await fetch(`${API_PRODUCTS}/${productId}`);
        const product = await res.json();

        container.innerHTML = `
            <p><strong>ID:</strong> ${product.product_id}</p>
            <p><strong>Name:</strong> ${product.name}</p>
            <p><strong>Category:</strong> ${product.category_id}</p>
            <p><strong>Price:</strong> ${product.price}</p>
            <p><strong>Description:</strong> ${product.description || ''}</p>
        `;
    } catch (error) {
        console.error("Error loading product:", error);
        container.innerHTML = "<p>Unable to load product details.</p>";
    }
}

fetchProduct();
    </script>
</body>
</html>
