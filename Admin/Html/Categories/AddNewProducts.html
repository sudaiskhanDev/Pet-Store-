<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products Management</title>
    <link rel="stylesheet" href="../../css/Categories/addnewproducts.css">
</head>

<body>

    <h2>Products Management</h2>

    <!-- ADD PRODUCT -->
    <section class="add-product">
        <h3>Add New Product</h3>
        <form id="productForm">
            <div class="form-group">
                <label>Category</label>
                <select id="categorySelect" name="category_id">
                    <option value="">Select Category</option>
                </select>
            </div>

            <div class="form-group">
                <label>Animal</label>
                <select id="animalSelect" name="animal_id">
                    <option value="">Select Animal</option>
                </select>
            </div>

            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="description" name="description"></textarea>
            </div>

            <div class="form-group">
                <label>Price</label>
                <input type="number" step="0.01" id="price" name="price" required>
            </div>

            <div class="form-group">
                <label>Stock Quantity</label>
                <input type="number" id="stock_quantity" name="stock_quantity" required>
            </div>

            <div class="form-group">
                <label>Product Image</label>
                <input type="file" id="image" name="image" accept="image/*">
            </div>

            <button type="submit" id="addProductBtn">Add Product</button>
        </form>
    </section>

    <hr>

    <!-- PRODUCT LIST -->
    <section class="product-list">
        <h3>All Products</h3>
        <table id="productsList" border="1">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Price ($)</th>
                    <th>Stock</th>
                    <th>Category</th>
                    <th>Animal</th>
                    <th>Description</th>
                    <th>Image</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <!-- Products will be populated here by JS -->
            </tbody>
        </table>
    </section>

    <script src="../../js/Categories/AddNewProducts.js"></script>
</body>
</html>
