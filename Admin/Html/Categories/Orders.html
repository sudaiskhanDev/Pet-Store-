  <div class="main-orders">

    <!-- nav-bar-items -->
    <nav role="navigation" aria-label="Main navigation" class="nav">
      <ul class="nav-list">
        <li class="nav-item"><a class="nav-link" href="AddNewProducts.html">Add New Products</a></li>

    <h1>Orders</h1>

    <!-- Orders Table -->
    <div class="list">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>User ID</th>
            <th>Order Date</th>
            <th>Status</th>
            <th>Total Amount</th>
            <th>Payment Method</th>
            <th>Shipping Address</th>
            <th>Phone</th>
            <th>Actions</th> <!-- Only Delete -->
          </tr>
        </thead>
        <tbody id="ordersTableBody">
          <!-- Template row hidden for cloning -->
          <tr class="template" data-id="" style="display:none;">
            <td class="td-id"></td>
            <td class="td-user"></td>
            <td class="td-date"></td>
            <td class="td-status"></td>
            <td class="td-amount"></td>
            <td class="td-payment"></td>
            <td class="td-shipping"></td>
            <td class="td-phone"></td>
            <td class="td-actions">
              <button class="delete">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>

  <script src="../../js/Categories/Order.js"></script>
</body>
</html>
