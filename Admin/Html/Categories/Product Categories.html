<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Categories Page</title>
    <link rel="stylesheet" href="../../css/Categories/productCategories.css">
</head>
<body>
    <h1>Categories Page</h1>

    <div class="input">
        <input type="text" id="categoryName" placeholder="Enter category name">
        <input type="text" id="categoryDescription" placeholder="Enter description (optional)">
        <button id="saveBtn">Save</button>
        <span class="error" id="errorMsg"></span>
    </div>

    <div class="list">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Category Name</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="categoriesTableBody">
                <!-- Rows will be here, JS will populate values only -->
                <!-- Example row -->
                <tr data-id="">
                    <td class="td-id"></td>
                    <td class="td-name"></td>
                    <td class="td-desc"></td>
                    <td class="td-actions">
                        <button class="edit">Edit</button>
                        <button class="delete">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="../../js/Categories/Product Categories.js"></script>
</body>
</html>
