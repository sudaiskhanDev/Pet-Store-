<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Items Page</title>
    <link rel="stylesheet" href="../../css/Categories/OrderItems.css">
</head>
<body>

    <h1>Order Items Page</h1>

    <div class="input">
        <input type="number" id="orderId" placeholder="Order ID">
        <input type="number" id="productId" placeholder="Product ID">
        <input type="number" id="quantity" placeholder="Quantity">
        <input type="number" step="0.01" id="price" placeholder="Price">

        <button id="saveBtn">Save</button>
        <span class="error" id="errorMsg"></span>
    </div>

    <div class="list">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Order ID</th>
                    <th>Product ID</th>
                    <th>Quantity</th>
                    <th>Price</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="orderItemsTableBody">
                <!-- Template row -->
                <tr data-id="">
                    <td class="td-id"></td>
                    <td class="td-order"></td>
                    <td class="td-product"></td>
                    <td class="td-quantity"></td>
                    <td class="td-price"></td>
                    <td class="td-actions">
                        <button class="edit">Edit</button>
                        <button class="delete">Delete</button>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="../../js/Categories/orderItems.js"></script>
</body>
</html>
