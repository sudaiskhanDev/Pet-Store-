<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Items Page</title>
    <link rel="stylesheet" href="../../css/Categories/OrderItems.css">
</head>
<body>

<h1>Order Items Page</h1>

<div class="list">
    <table border="1">
        <thead>
            <tr>
                <th>ID</th>
                <th>Order ID</th>
                <th>Product ID</th>
                <th>Quantity</th>
                <th>Price</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody id="orderItemsTableBody">

            <!-- 🔥 Template Row -->
            <tr id="templateRow" style="display: none;">
                <td class="td-id"></td>
                <td class="td-order"></td>
                <td class="td-product"></td>
                <td class="td-quantity"></td>
                <td class="td-price"></td>
                <td>
                    <button class="delete">Delete</button>
                </td>
            </tr>

        </tbody>
    </table>
</div>

<script src="../../js/Categories/orderItems.js"></script>
</body>
</html>
