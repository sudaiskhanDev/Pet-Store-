<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Items CRUD</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    .form-box input {
      margin: 5px;
      padding: 8px;
    }

    button {
      padding: 6px 10px;
      margin: 2px;
      cursor: pointer;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: center;
    }
  </style>
</head>

<body>

<h2>Order Items CRUD</h2>

<!-- FORM -->
<div class="form-box">
  <input type="hidden" id="order_item_id">

  <input type="number" id="order_id" placeholder="Order ID">
  <input type="number" id="product_id" placeholder="Product ID">
  <input type="number" id="quantity" placeholder="Quantity">
  <input type="number" id="price" placeholder="Price">

  <button onclick="saveItem()">Save</button>
  <button onclick="resetForm()">Clear</button>
</div>

<!-- TABLE -->
<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Order</th>
      <th>Product</th>
      <th>Qty</th>
      <th>Price</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="tableBody"></tbody>
</table>

<script>
const API_BASE = "http://127.0.0.1:8000/api/order-items";

const tableBody = document.getElementById("tableBody");

// ================= CREATE / UPDATE =================
async function saveItem() {

  const id = document.getElementById("order_item_id").value;

  const data = {
    order_id: document.getElementById("order_id").value,
    product_id: document.getElementById("product_id").value,
    quantity: document.getElementById("quantity").value,
    price: document.getElementById("price").value
  };

  let url = API_BASE;
  let method = "POST";

  if (id) {
    url = `${API_BASE}/${id}`;
    method = "PUT";
  }

  await fetch(url, {
    method: method,
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(data)
  });

  resetForm();
  fetchItems();
}

// ================= READ =================
async function fetchItems() {
  const res = await fetch(API_BASE);
  const response = await res.json();

  const items = response.data;

  tableBody.innerHTML = "";

  items.forEach(item => {
    const row = `
      <tr>
        <td>${item.order_item_id}</td>
        <td>${item.order_id}</td>
        <td>${item.product_id}</td>
        <td>${item.quantity}</td>
        <td>${item.price}</td>
        <td>
          <button onclick='editItem(${JSON.stringify(item)})'>Edit</button>
          <button onclick='deleteItem(${item.order_item_id})'>Delete</button>
        </td>
      </tr>
    `;

    tableBody.innerHTML += row;
  });
}

// ================= EDIT =================
function editItem(item) {
  document.getElementById("order_item_id").value = item.order_item_id;
  document.getElementById("order_id").value = item.order_id;
  document.getElementById("product_id").value = item.product_id;
  document.getElementById("quantity").value = item.quantity;
  document.getElementById("price").value = item.price;
}

// ================= DELETE =================
async function deleteItem(id) {
  if (!confirm("Delete this item?")) return;

  await fetch(`${API_BASE}/${id}`, {
    method: "DELETE"
  });

  fetchItems();
}

// ================= RESET =================
function resetForm() {
  document.getElementById("order_item_id").value = "";
  document.getElementById("order_id").value = "";
  document.getElementById("product_id").value = "";
  document.getElementById("quantity").value = "";
  document.getElementById("price").value = "";
}

// INIT
fetchItems();

</script>

</body>
</html>
