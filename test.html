<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Stripe Payment Demo Fixed</title>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        input { margin: 5px 0; padding: 8px; width: 300px; }
        button { padding: 10px 20px; margin-top: 10px; }
        #card-element { margin-top: 20px; width: 300px; }
    </style>
</head>
<body>

<h2>Make a Payment</h2>

<label>Amount (USD)</label><br>
<input type="number" id="amount" placeholder="Enter Amount" value="10"><br>

<button id="payBtn">Pay Now</button>

<div id="card-element"></div>
<button id="confirmBtn" style="display:none;">Confirm Payment</button>

<script>
const stripe = Stripe("pk_test_51T3YGjPubxVvHrmFHvOK8ut1lXw8X7nL77iYk0Y47aj4G6758ndZDGRnWu54qEuv2mk3feOfbRNTKZmwRe9A8Cbx00VNTxBm5d");
const elements = stripe.elements();
const card = elements.create("card");
card.mount("#card-element");

let clientSecret = "";

document.getElementById("payBtn").addEventListener("click", async () => {
    const amount = document.getElementById("amount").value;

    if (!amount) {
        alert("Enter Amount");
        return;
    }

    try {
        const response = await fetch("http://127.0.0.1:8000/api/payments/create-payment-intent", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ amount: parseFloat(amount) })
        });

        if (!response.ok) throw new Error("API error");

        const data = await response.json();
        clientSecret = data.clientSecret;
        document.getElementById("confirmBtn").style.display = "block";

    } catch (err) {
        console.error(err);
        alert("Error creating payment intent. Check console for details.");
    }
});

document.getElementById("confirmBtn").addEventListener("click", async () => {
    const amount = parseFloat(document.getElementById("amount").value);

    if (!clientSecret) {
        alert("Click Pay Now first");
        return;
    }

    try {
        const { paymentIntent, error } = await stripe.confirmCardPayment(clientSecret, {
            payment_method: { card: card }
        });

        if (error) {
            alert(error.message);
            return;
        }

        const storeResponse = await fetch("http://127.0.0.1:8000/api/payments", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                amount: amount,
                stripe_payment_id: paymentIntent.id,
                status: 'completed'
            })
        });

        if (!storeResponse.ok) {
            const errData = await storeResponse.json();
            console.error(errData);
            alert("Failed to store payment. Check console for details.");
            return;
        }

        alert("Payment Successful!");
        document.getElementById("confirmBtn").style.display = "none";
        document.getElementById("amount").value = "10";

    } catch (err) {
        console.error(err);
        alert("Unexpected error occurred. Check console.");
    }
});
</script>

</body>
</html>
