<div class="stat-box" id="totalUsers">Customers</div>

<script>
const apiBase = 'http://127.0.0.1:8000/api';

// Function to fetch total users
async function fetchTotalUsers() {
    try {
        const response = await fetch(`${apiBase}/users/total`);
        if (!response.ok) throw new Error('Failed to fetch total users');

        const data = await response.json();
        document.getElementById('totalUsers').innerText = data.total;
    } catch (error) {
        console.error(error);
        document.getElementById('totalUsers').innerText = 'Error';
    }
}

// Load total users on page load
fetchTotalUsers();
</script>
