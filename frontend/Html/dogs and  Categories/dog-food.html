<!DOCTYPE html>
<html>
<head>
<title>Dog Food</title>
<link rel="stylesheet" href="../../Css/cat and Dog category/cat and Dog category.css">
</head>
<body>

<div class="main-animals-catgegory">

<nav class="nav-bar">
    <h1 class="brand">Happy Paws Haven</h1>

    <div class="nav-links">
        <a href="../index.html" class="nav-link">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="../Pages/Cart.html" class="cart-button">
            <i class="fas fa-shopping-cart"></i>
            <span>Cart</span>
        </a>
    </div>
</nav>
   
<nav>
    <ul>
        <li><a href="./dog-food.html">Dog Food</a></li>
        <li><a href="./dog-Accessories.html">Dog Accessories</a></li>
        <li><a href="./dog-grooming.html">Dog Grooming</a></li>
        <li><a href="./dog-travel.html">Dog Travel</a></li>
    </ul>
</nav>

<h1>Dog Food</h1>

<div id="products"></div>
<div id="error"></div>

<!-- TEMPLATE -->
<template id="product-template">
<div class="product-card">
    <img class="product-image">
    <div class="product-name"></div>
    <div class="product-price"></div>
    <div class="product-category"></div>
    <div class="product-animal"></div>
    <div class="product-stock"></div> <!-- ✅ added -->
</div>
</template>

</div>
<script>
const API_URL="http://localhost:8000/api/products";
const ANIMAL_NAME="Dogs";
const CATEGORY_NAME="Food";

async function fetchProducts(){
    try {
        let res = await fetch(API_URL);
        if(!res.ok) throw new Error("Fetch failed");

        let data = await res.json();
        let products = data.products || [];

        // Filter by animal and category
        products = products.filter(p => 
            p.animal_name === ANIMAL_NAME && 
            p.category_name === CATEGORY_NAME
        );

        let container = document.getElementById("products");
        container.innerHTML = "";
        let template = document.getElementById("product-template");

        if(products.length === 0){
            document.getElementById("error").textContent = "No products available.";
            return;
        }

        products.forEach(p => {
            let clone = template.content.cloneNode(true);

            clone.querySelector(".product-image").src =
                p.image ? `http://localhost:8000/storage/${p.image}` 
                        : "https://via.placeholder.com/200";

            clone.querySelector(".product-name").textContent = p.name;
            clone.querySelector(".product-price").textContent = "Price: ₹" + parseFloat(p.price).toLocaleString();
            clone.querySelector(".product-category").textContent = "Category: " + p.category_name;
            clone.querySelector(".product-animal").textContent = "Animal: " + p.animal_name;

            // ✅ STOCK with Out of Stock logic
            const stockDiv = clone.querySelector(".product-stock");
            if(!p.stock_quantity || p.stock_quantity <= 1){
                stockDiv.textContent = "Out of Stock";
                stockDiv.style.color = "red";
            } else {
                stockDiv.textContent = "Stock: " + p.stock_quantity;
                stockDiv.style.color = "green";
            }

            clone.querySelector(".product-card").addEventListener("click", () => {
                window.location.href = `../../Html/Pages/product-detail.html?id=${p.product_id}`;
            });

            container.appendChild(clone);
        });

    } catch(err){
        console.error(err);
        document.getElementById("error").textContent = "Error loading products.";
    }
}

fetchProducts();
</script>
</body>
</html>
