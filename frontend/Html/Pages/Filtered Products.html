<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Filter Products</title>
<style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f9f9f9; }
    h2 { margin-bottom: 20px; }
    .filter-category select { padding: 10px; font-size: 16px; width: 250px; margin-bottom: 20px; }
    .products { display: flex; flex-wrap: wrap; gap: 15px; }
    .product { border: 1px solid #ddd; padding: 10px; width: 200px; background: #fff; transition: transform 0.3s; }
    .product:hover { transform: translateY(-5px); }
    .product img { width: 100%; height: 150px; object-fit: cover; }
    .product h4 { margin: 10px 0 5px 0; }
    .product p { margin: 5px 0; }
</style>
</head>
<body>

<h2>Filter Products</h2>

<div class="filter-category">
    <select id="categoryDropdown">
        <option value="">-- Select Category --</option>
    </select>
</div>

<div class="products" id="productsContainer">
    <!-- Products will appear here -->
</div>

<script>
    const dropdown = document.getElementById('categoryDropdown');
    const productsContainer = document.getElementById('productsContainer');

    // Fetch categories from API
    fetch('http://127.0.0.1:8000/api/categories')
        .then(res => res.json())
        .then(data => {
            data.forEach(category => {
                const option = document.createElement('option');
                option.value = category.category_id;
                option.textContent = category.category_name;
                dropdown.appendChild(option);
            });
        })
        .catch(err => console.error('Error fetching categories:', err));

    // Fetch all products once
    let allProducts = [];
    fetch('http://127.0.0.1:8000/api/products')
        .then(res => res.json())
        .then(data => { allProducts = data.products; })
        .catch(err => console.error('Error fetching products:', err));

    // Filter products on category change
    dropdown.addEventListener('change', function() {
        const selectedId = this.value;
        productsContainer.innerHTML = '';

        if(!selectedId) return;

        const filtered = allProducts.filter(p => p.category_id == selectedId);

        if(filtered.length === 0) {
            productsContainer.innerHTML = '<p>No products found for this category.</p>';
            return;
        }

        filtered.forEach(p => {
            const div = document.createElement('div');
            div.className = 'product';
            div.innerHTML = `
                <img src="${p.image !== 'NA' ? 'http://127.0.0.1:8000/storage/' + p.image : 'https://via.placeholder.com/200x150'}" alt="${p.name}">
                <h4>${p.name}</h4>
                <p>Price: $${p.price}</p>
                <p>${p.description}</p>
            `;
            productsContainer.appendChild(div);
        });
    });
</script>

</body>
</html>
