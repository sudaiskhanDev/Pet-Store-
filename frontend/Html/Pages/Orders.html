<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Orders</title>
<link rel="stylesheet" href="../../Css/Pages/Cart.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">

<style>
.order-container { display:flex; flex-wrap:wrap; gap:20px; margin-top:20px; }
.order-card { border:1px solid #ccc; padding:15px; border-radius:10px; width:300px; position:relative; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.order-card h3 { margin:5px 0; font-size:18px; }
.order-card p { margin:3px 0; font-size:14px; }

.deleteBtn {
    position:absolute;
    top:10px;
    right:10px;
    padding:6px 12px;
    background:#FE4600;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

/* Notification */
#notification {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #FE4600;
    color: white;
    padding: 12px 18px;
    border-radius: 8px;
    display: none;
    z-index: 999;
    animation: slideIn 0.3s ease;
}

@keyframes slideIn {
    from { transform: translateX(100%); opacity:0; }
    to { transform: translateX(0); opacity:1; }
}

.empty-msg { margin-top:20px; color:#555; }
</style>
</head>

<body>

<div id="notification"></div>

<div class="orders-page">
    <nav class="nav-bar">
        <h1 class="brand">Happy Paws Haven</h1>
        <div class="buttons">
            <a href="../index.html"><i class="fas fa-home"></i> Home</a>
            <a href="../Pages/Cart.html"><button>Cart</button></a>
        </div>
    </nav>

    <h1>My Orders</h1>
    <div id="ordersContainer" class="order-container"></div>

    <template id="orderTemplate">
        <div class="order-card">
            <h3 class="orderId"></h3>
            <p><b>Date:</b> <span class="orderDate"></span></p>
            <p><b>Status:</b> <span class="orderStatus"></span></p>
            <p><b>Total:</b> $<span class="orderTotal"></span></p>
            <p><b>Payment:</b> <span class="orderPayment"></span></p>
            <p><b>Address:</b> <span class="orderAddress"></span></p>
            <p><b>Phone:</b> <span class="orderPhone"></span></p>
            <button class="deleteBtn">Delete</button>
        </div>
    </template>
</div>

<script>
const API = "http://localhost:8000/api/my-orders"; // ✅ NEW ROUTE
const token = localStorage.getItem("token");

const notification = document.getElementById("notification");

function showNotification(msg) {
    notification.textContent = msg;
    notification.style.display = "block";
    setTimeout(() => {
        notification.style.display = "none";
    }, 3000);
}

// 🚨 Login check
if (!token) {
    showNotification("Login required");
    setTimeout(() => {
        window.location.href = "../UserAuth/login.html";
    }, 1500);
}

// 📦 Load Orders
async function loadOrders() {
    try {
        const res = await fetch(API, {
            headers: { "Authorization": "Bearer " + token }
        });

        if (res.status === 401) {
            localStorage.removeItem("token");
            showNotification("Session expired");
            setTimeout(() => {
                window.location.href = "../UserAuth/login.html";
            }, 1500);
            return;
        }

        const orders = await res.json();
        const container = document.getElementById("ordersContainer");
        const template = document.getElementById("orderTemplate");

        container.innerHTML = "";

        if (orders.length === 0) {
            container.innerHTML = "<p class='empty-msg'>No orders found</p>";
            return;
        }

        orders.forEach(order => {
            const clone = template.content.cloneNode(true);

            clone.querySelector(".orderId").textContent = "Order #" + order.order_id;
            clone.querySelector(".orderDate").textContent = order.order_date;
            clone.querySelector(".orderStatus").textContent = order.status;
            clone.querySelector(".orderTotal").textContent = order.total_amount;
            clone.querySelector(".orderPayment").textContent = order.payment_method;
            clone.querySelector(".orderAddress").textContent = order.shipping_address;
            clone.querySelector(".orderPhone").textContent = order.phone;

            clone.querySelector(".deleteBtn").onclick = () => deleteOrder(order.order_id);

            container.appendChild(clone);
        });

    } catch (err) {
        console.error(err);
        showNotification("Failed to load orders");
    }
}

// ❌ Delete Order (secure route)
async function deleteOrder(id) {

    if (!confirm("Delete this order?")) return;

    try {
        const res = await fetch(API + "/" + id, {
            method: "DELETE",
            headers: { "Authorization": "Bearer " + token }
        });

        if (res.ok) {
            showNotification("Order deleted");
            loadOrders();
        } else {
            const data = await res.json();
            showNotification(data.message || "Delete failed");
        }

    } catch (err) {
        console.error(err);
        showNotification("Error deleting order");
    }
}

// 🚀 Init
loadOrders();
</script>

</body>
</html>
