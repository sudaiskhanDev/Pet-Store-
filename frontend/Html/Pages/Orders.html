<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Orders</title>
<link rel="stylesheet" href="../../Css/Pages/Cart.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
<style>
/* Orders page overrides */
.order-container { display:flex; flex-wrap:wrap; gap:20px; margin-top:20px; }
.order-card { border:1px solid #ccc; padding:15px; border-radius:10px; width:300px; position:relative; box-shadow:0 2px 5px rgba(0,0,0,0.1);}
.order-card h3 { margin:5px 0; font-size:18px; }
.order-card p { margin:3px 0; font-size:14px; }
.deleteBtn { position:absolute; top:10px; right:10px; padding:5px 10px; background:#FE4600; color:white; border:none; border-radius:5px; cursor:pointer; }
.empty-msg { font-size:16px; color:#555; margin-top:20px; }
</style>
</head>
<body>

<div class="orders-page">
    <nav class="nav-bar">
        <h1 class="brand">Happy Paws Haven</h1>
        <div class="buttons">
            <a href="../index.html"><i class="fas fa-home"></i> Home</a>
            <a href="../Pages/Cart.html"><button>Cart</button></a>
        </div>
    </nav>

    <h1>My Orders</h1>
    <div id="ordersContainer" class="order-container"></div>

    <!-- Hidden template -->
    <template id="orderTemplate">
        <div class="order-card">
            <h3 class="orderId"></h3>
            <p><b>Date:</b> <span class="orderDate"></span></p>
            <p><b>Status:</b> <span class="orderStatus"></span></p>
            <p><b>Total:</b> $<span class="orderTotal"></span></p>
            <p><b>Payment:</b> <span class="orderPayment"></span></p>
            <p><b>Address:</b> <span class="orderAddress"></span></p>
            <p><b>Phone:</b> <span class="orderPhone"></span></p>
            <button class="deleteBtn">Delete</button>
        </div>
    </template>
</div>

<script>
const API = "http://localhost:8000/api/orders";
const token = localStorage.getItem("token");

// Redirect if not logged in
if (!token) {
    alert("You must be logged in to view your orders.");
    window.location.href = "../UserAuth/login.html"; // Adjust path to login page
}

async function loadOrders() {
    try {
        const res = await fetch(API, {
            headers: { "Authorization": "Bearer " + token }
        });

        if(res.status === 401) { // token expired or invalid
            alert("Session expired. Please log in again.");
            localStorage.removeItem("token");
            window.location.href = "../Pages/login.html";
            return;
        }

        const orders = await res.json();
        const container = document.getElementById("ordersContainer");
        const template = document.getElementById("orderTemplate");

        container.innerHTML = "";

        if(orders.length === 0){
            container.innerHTML = '<p class="empty-msg">You have no orders yet.</p>';
            return;
        }

        orders.forEach(order => {
            const clone = template.content.cloneNode(true);
            clone.querySelector(".orderId").textContent = "Order ID: #" + order.order_id;
            clone.querySelector(".orderDate").textContent = order.order_date;
            clone.querySelector(".orderStatus").textContent = order.status;
            clone.querySelector(".orderTotal").textContent = order.total_amount;
            clone.querySelector(".orderPayment").textContent = order.payment_method;
            clone.querySelector(".orderAddress").textContent = order.shipping_address;
            clone.querySelector(".orderPhone").textContent = order.phone;

            clone.querySelector(".deleteBtn").onclick = () => deleteOrder(order.order_id);

            container.appendChild(clone);
        });
    } catch (error) {
        console.error("Error loading orders:", error);
        const container = document.getElementById("ordersContainer");
        container.innerHTML = '<p class="empty-msg">Failed to load orders. Try again later.</p>';
    }
}

async function deleteOrder(id) {
    if(!confirm("Are you sure you want to delete this order?")) return;

    try {
        const res = await fetch(API + "/" + id, {
            method: "DELETE",
            headers: { "Authorization": "Bearer " + token }
        });

        if(res.status === 200){
            loadOrders(); // refresh after deletion
        } else {
            const data = await res.json();
            alert(data.message || "Failed to delete order.");
        }
    } catch (error) {
        console.error("Error deleting order:", error);
        alert("Error deleting order.");
    }
}

// Initial load
loadOrders();
</script>

</body>
</html>
