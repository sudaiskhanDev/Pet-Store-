<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Orders - Happy Paws Haven</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../../Css/Pages/Orders.css">
<style>
  #notification { display:none; position:fixed; top:10px; left:50%; transform:translateX(-50%); background:#4caf50; color:#fff; padding:10px 20px; border-radius:5px; z-index:1001; }
</style>
</head>
<body>

<div id="notification"></div>

<div class="orders-page">
  <nav class="nav-bar">
    <h1 class="brand">Happy Paws Haven</h1>
    <div class="buttons">
      <a href="../index.html"><i class="fas fa-home"></i> Home</a>
      <a href="../Pages/Cart.html"><button>Cart</button></a>
    </div>
  </nav>

  <h1>My Orders</h1>
  <div id="ordersContainer" class="order-container"></div>

  <!-- Template for orders (no delete button) -->
  <template id="orderTemplate">
    <div class="order-card">
      <h3 class="orderId"></h3>
      <p><b>Date:</b> <span class="orderDate"></span></p>
      <p><b>Status:</b> <span class="orderStatus"></span></p>
      <p><b>Total:</b> $<span class="orderTotal"></span></p>
      <p><b>Payment:</b> <span class="orderPayment"></span></p>
      <p><b>Address:</b> <span class="orderAddress"></span></p>
      <p><b>Phone:</b> <span class="orderPhone"></span></p>
    </div>
  </template>
</div>
<script>
const API = "http://localhost:8000/api/my-orders";
const token = localStorage.getItem("token");
const notification = document.getElementById("notification");

// Show notification
function showNotification(msg) {
  notification.textContent = msg;
  notification.style.display = "block";
  setTimeout(() => { notification.style.display = "none"; }, 3000);
}

// Redirect if not logged in
if (!token) {
  showNotification("Login required");
  setTimeout(() => { window.location.href = "../UserAuth/login.html"; }, 1500);
}

// --- Load Orders ---
async function loadOrders() {
  try {
    const res = await fetch(API, {
      headers: { "Authorization": "Bearer " + token }
    });

    if (res.status === 401) {
      localStorage.removeItem("token");
      showNotification("Session expired");
      setTimeout(() => { window.location.href = "../UserAuth/login.html"; }, 1500);
      return;
    }

    const orders = await res.json();
    console.log("Orders Data:", orders); // 🔥 DEBUG

    const container = document.getElementById("ordersContainer");
    const template = document.getElementById("orderTemplate");
    container.innerHTML = "";

    if (!orders || orders.length === 0) {
      container.innerHTML = "<p class='empty-msg'>No orders found</p>";
      return;
    }

    orders.forEach(order => {
      const clone = template.content.cloneNode(true);

      // ✅ SAFE ID FIX
      const orderId = order.id || order.order_id || order.orderId || "N/A";

      clone.querySelector(".orderId").textContent = "Order #" + orderId;
      clone.querySelector(".orderDate").textContent = order.order_date || "N/A";
      clone.querySelector(".orderStatus").textContent = order.status || "N/A";
      clone.querySelector(".orderTotal").textContent = order.total_amount || "0";
      clone.querySelector(".orderPayment").textContent = order.payment_method || "N/A";
      clone.querySelector(".orderAddress").textContent = order.shipping_address || "N/A";
      clone.querySelector(".orderPhone").textContent = order.phone || "N/A";

      container.appendChild(clone);
    });

  } catch (err) {
    console.error(err);
    showNotification("Failed to load orders");
  }
}

// Initial load
loadOrders();
</script>
