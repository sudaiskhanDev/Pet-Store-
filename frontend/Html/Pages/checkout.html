<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Checkout | Happy Paws Haven</title>
<!-- Google Fonts + Font Awesome -->
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://js.stripe.com/v3/"></script>
<link rel="stylesheet" href="../../Css/Pages/checkout.css">
</head>
<body>
<div class="checkout">
    <!-- Navbar -->
    <nav class="nav-bar">
        <h1 class="brand"><i class="fas fa-paw"></i> Happy Paws Haven</h1>
        <div class="buttons">
            <a href="../index.html"><i class="fas fa-home"></i> Home</a>
            <a href="All Products.html"><i class="fas fa-boxes"></i> Products</a>
            <a href="../Pages/Cart.html"><button><i class="fas fa-shopping-cart"></i> Cart</button></a>
        </div>
    </nav>

    <h1><i class="fas fa-credit-card"></i> Checkout</h1>

    <div class="checkout-grid">
        <!-- Left: Order Summary -->
        <div class="cart-summary">
            <h2><i class="fas fa-receipt"></i> Your Order</h2>
            <div id="checkoutContainer">
                <div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i> Loading cart...</div>
            </div>
            <div id="totalDisplay" class="total-row"></div>
        </div>

        <!-- Right: Shipping & Payment -->
        <div class="shipping-form">
            <h2><i class="fas fa-truck"></i> Shipping Details</h2>
            <form id="checkoutForm">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Full Name" required>
                </div>
                <div class="form-group">
                    <input type="text" name="address" placeholder="Street Address" required>
                </div>
                <div class="form-group">
                    <input type="text" name="city" placeholder="City" required>
                </div>
                <div class="form-group">
                    <input type="text" name="zip" placeholder="Zip Code" required>
                </div>
                <div class="form-group">
                    <input type="tel" name="phone" placeholder="Phone Number" required>
                </div>

                <h2 style="margin-top: 1rem;"><i class="fas fa-wallet"></i> Payment Method</h2>
                <div class="form-group">
                    <select name="payment_method" id="paymentMethod" required>
                        <option value="cod">Cash on Delivery</option>
                        <option value="card">Credit / Debit Card (Stripe)</option>
                    </select>
                </div>

                <div id="card-container" style="display: none;">
                    <div class="form-group">
                        <label>Card Details</label>
                        <div id="card-element"></div>
                        <div id="card-errors" class="error-message" role="alert"></div>
                    </div>
                </div>

                <button type="submit" id="placeOrderBtn">Place Order <i class="fas fa-lock"></i></button>
                <div id="loader">Processing... <i class="fas fa-spinner fa-pulse"></i></div>
            </form>
        </div>
    </div>
</div>

<div id="toast-container"></div>

<script src="../../Js/pages/checkout.js"></script>
</body>
</html>
