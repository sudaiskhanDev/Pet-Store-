<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>My Cart | Happy Paws Haven</title>
<!-- Google Fonts + Font Awesome -->
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="../../Css/Pages/Cart.css">
</head>
<body>
<div class="cart-page">
    <!-- Navbar -->
    <nav class="nav-bar">
        <h1 class="brand"><i class="fas fa-paw"></i> Happy Paws Haven</h1>
        <div class="buttons">
            <a href="../index.html"><i class="fas fa-home"></i> Home</a>
            <a href="All Products.html"><i class="fas fa-boxes"></i> Products</a>
            <a href="../Pages/Cart.html"><button><i class="fas fa-shopping-cart"></i> Cart</button></a>
        </div>
    </nav>

    <h1><i class="fas fa-shopping-cart"></i> My Cart</h1>

    <div id="cartContainer" class="cart-container">
        <div class="empty-cart"><i class="fas fa-spinner fa-pulse"></i> Loading your cart...</div>
    </div>

    <div class="checkout-wrapper" id="checkoutWrapper" style="display: none;">
        <div class="total-price">Total: <span id="cartTotal">$0.00</span></div>
        <button id="checkoutBtn">Proceed to Checkout <i class="fas fa-arrow-right"></i></button>
    </div>
</div>

<div id="notificationContainer"></div>


<script src="../../Js/pages/Cart.js"></script>
</body>
</html>
