<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Cart</title>
<link rel="stylesheet" href="../../Css/Pages/Cart.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Font Awesome (for icons) -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" integrity="" crossorigin="anonymous">
</head>
<body>
<div class="cart-page">
    <!-- Navbar -->
    <nav class="nav-bar">
        <h1 class="brand">Happy Paws Haven</h1>
        <div class="buttons"> 
            <a href="../index.html"><i class="fas fa-home"></i> Home</a>
            <a href="../Pages/Cart.html"><button>Cart</button></a>
        </div>
    </nav>

    <h1>My Cart</h1>

    <div id="cartContainer" class="cart-container"></div>

    <!-- Proceed to Checkout Button -->
    <button id="checkoutBtn" style="margin-top:20px; padding:10px 20px; font-size:16px;">Proceed to Checkout</button>

    <!-- Notification container -->
    <div id="notificationContainer" style="
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999;
    "></div>

    <!-- Hidden template -->
    <template id="cartTemplate">
        <div class="cart-card">
            <img class="productImage" src="" alt="">
            <h3 class="productName"></h3>
            <p><b>Price:</b> $<span class="productPrice"></span></p>
            <p class="productDescription"></p>
            <p><b>Quantity:</b> <span class="productQty"></span></p>
            <div class="cart-actions">
                <button class="increaseBtn">+</button>
                <button class="decreaseBtn">-</button>
                <button class="removeBtn">Remove</button>
            </div>
        </div>
    </template>
</div>

<script src="../../Js/pages/cart.js"></script>
</body>
</html>
